<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – UmanitY</title>
</head>
<body>
  <h1>Interface Admin – UmanitY</h1>
  <pre id="adminData">Chargement des données...</pre>
  <script>
    fetch('/admin/data')
      .then(response => response.json())
      .then(data => {
        document.getElementById('adminData').textContent = JSON.stringify(data, null, 2);
      });
  </script>
</body>
</html>
